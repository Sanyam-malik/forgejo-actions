name: Clone Git Repository
description: Clone a git repository supporting branch, tag, commit, or PR refs with optional shallow clone

inputs:
  repo:
    description: Repository URL
    required: true

  ref:
    description: Branch, tag, commit SHA, or ref
    required: false
    default: ""

  depth:
    description: Clone depth (0 = full clone)
    required: false
    default: "1"

  token:
    description: Authentication token (optional)
    required: false
    default: ""

  directory:
    description: Directory to clone into
    required: false
    default: "repo"

outputs:
  repo_dir:
    description: Path to cloned repository
    value: ${{ steps.clone.outputs.repo_dir }}

runs:
  using: composite
  steps:
    - id: clone
      name: Clone repository
      shell: bash
      run: |
        set -e

        REPO="${{ inputs.repo }}"
        REF="${{ inputs.ref }}"
        DEPTH="${{ inputs.depth }}"
        TOKEN="${{ inputs.token }}"
        DIR="${{ inputs.directory }}"

        if [ -n "$TOKEN" ]; then
          REPO=$(echo "$REPO" | sed "s#https://#https://${TOKEN}@#")
        fi

        echo "Repository: $REPO"
        echo "Ref: ${REF:-default}"
        echo "Depth: $DEPTH"
        echo "Directory: $DIR"

        # If no ref specified use normal clone
        if [ -z "$REF" ]; then
          if [ "$DEPTH" = "0" ]; then
            echo "Performing full clone"
            git clone "$REPO" "$DIR"
          else
            echo "Performing shallow clone (depth=$DEPTH)"
            git clone --depth "$DEPTH" "$REPO" "$DIR"
          fi

          cd "$DIR"

        else
          echo "Cloning specific ref: $REF"

          mkdir -p "$DIR"
          cd "$DIR"

          git init

          git remote add origin "$REPO"

          if [ "$DEPTH" = "0" ]; then
            echo "Fetching full history for $REF"
            git fetch origin "$REF"
          else
            echo "Fetching shallow history (depth=$DEPTH) for $REF"
            git fetch --depth "$DEPTH" origin "$REF"
          fi

          git checkout FETCH_HEAD
        fi

        echo "Repository cloned successfully"
        echo "Current commit:"
        git log -1 --oneline

        echo "repo_dir=$PWD" >> "$GITHUB_OUTPUT"
        echo "Cloned repository path: $PWD"