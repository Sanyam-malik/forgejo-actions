name: Publish Maven Package
description: Publish artifacts (Gradle or Maven) to a Maven registry

inputs:
  registry:
    description: Registry hostname
    required: true

  user:
    description: Registry username
    required: true

  token:
    description: Registry token
    required: true

  build_tool:
    description: Build tool to use (gradle or maven)
    required: false
    default: gradle

outputs:
  package_url:
    description: Maven repository URL
    value: ${{ steps.gradle.outputs.package_url || steps.maven.outputs.package_url }}

runs:
  using: composite
  steps:

    # =========================
    # Gradle flow
    # =========================
    - id: gradle
      name: Publish (Gradle)
      if: inputs.build_tool == 'gradle'
      shell: bash
      run: |
        set -euo pipefail

        OWNER="${GITHUB_REPOSITORY%%/*}"
        OWNER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
        REPO_NAME=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')

        REGISTRY="${{ inputs.registry }}"
        USER="${{ inputs.user }}"
        TOKEN="${{ inputs.token }}"

        PACKAGE_URL="https://${REGISTRY}/api/packages/${OWNER}/maven"
        echo "package_url=$PACKAGE_URL" >> "$GITHUB_OUTPUT"

        export MAVEN_PACKAGE_URL="$PACKAGE_URL"
        export MAVEN_USER="$USER"
        export MAVEN_TOKEN="$TOKEN"

        # -------------------------
        # Collect coordinates from publishing (NO custom task)
        # -------------------------
        mapfile -t COORDS < <(
          gradle -q -I /dev/stdin <<'EOF'
        allprojects {
          afterEvaluate { p ->
            def pub = p.extensions.findByName("publishing")
            if (pub != null) {
              pub.publications.each { publication ->
                if (publication.hasProperty("groupId")) {
                  println "${publication.groupId}:${publication.artifactId}:${publication.version}"
                }
              }
            }
          }
        }
        EOF
        )

        if [[ ${#COORDS[@]} -eq 0 ]]; then
          echo "No publishable coordinates found"
          exit 1
        fi

        # De-duplicate
        declare -A SEEN=()
        UNIQUE_COORDS=()
        for c in "${COORDS[@]}"; do
          if [[ -n "$c" && -z "${SEEN[$c]+x}" ]]; then
            SEEN[$c]=1
            UNIQUE_COORDS+=("$c")
          fi
        done

        echo "Found ${#UNIQUE_COORDS[@]} artifact(s):"
        printf ' - %s\n' "${UNIQUE_COORDS[@]}"

        # -------------------------
        # Delete existing versions
        # -------------------------
        for c in "${UNIQUE_COORDS[@]}"; do
          IFS=':' read -r G A V <<< "$c"

          DELETE_URL="https://${REGISTRY}/api/v1/packages/${OWNER}/maven/${G}:${A}/${V}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -u "${USER}:${TOKEN}" \
            "$DELETE_URL")

          if [[ "$STATUS" != "204" && "$STATUS" != "404" ]]; then
            echo "Delete failed for ${G}:${A}:${V} (HTTP $STATUS)"
            exit 1
          fi
        done

        # -------------------------
        # Publish via Gradle
        # -------------------------
        gradle publish

        # -------------------------
        # Link artifacts
        # -------------------------
        for c in "${UNIQUE_COORDS[@]}"; do
          IFS=':' read -r G A V <<< "$c"

          LINK_URL="https://${REGISTRY}/api/v1/packages/${OWNER}/maven/${G}:${A}/-/link/${REPO_NAME}"

          curl -s -o /dev/null \
            -X POST \
            -u "${USER}:${TOKEN}" \
            "$LINK_URL"
        done

        echo "Publish complete (Gradle)."


    # =========================
    # Maven flow
    # =========================
    - id: maven
      name: Publish (Maven)
      if: inputs.build_tool == 'maven'
      shell: bash
      run: |
        set -euo pipefail

        OWNER="${GITHUB_REPOSITORY%%/*}"
        OWNER=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
        REPO_NAME=$(echo "${GITHUB_REPOSITORY##*/}" | tr '[:upper:]' '[:lower:]')

        REGISTRY="${{ inputs.registry }}"
        USER="${{ inputs.user }}"
        TOKEN="${{ inputs.token }}"

        PACKAGE_URL="https://${REGISTRY}/api/packages/${OWNER}/maven"
        echo "package_url=$PACKAGE_URL" >> "$GITHUB_OUTPUT"

        # -------------------------
        # Collect coordinates (multi-module safe)
        # -------------------------
        mapfile -t COORDS < <(
          mvn -q \
            -Dexec.executable=echo \
            -Dexec.args='${project.groupId}:${project.artifactId}:${project.version}' \
            exec:exec
        )

        if [[ ${#COORDS[@]} -eq 0 ]]; then
          echo "No publishable coordinates found"
          exit 1
        fi

        # De-duplicate
        declare -A SEEN=()
        UNIQUE_COORDS=()
        for c in "${COORDS[@]}"; do
          if [[ -n "$c" && -z "${SEEN[$c]+x}" ]]; then
            SEEN[$c]=1
            UNIQUE_COORDS+=("$c")
          fi
        done

        echo "Found ${#UNIQUE_COORDS[@]} artifact(s):"
        printf ' - %s\n' "${UNIQUE_COORDS[@]}"

        # -------------------------
        # Delete existing versions
        # -------------------------
        for c in "${UNIQUE_COORDS[@]}"; do
          IFS=':' read -r G A V <<< "$c"

          DELETE_URL="https://${REGISTRY}/api/v1/packages/${OWNER}/maven/${G}:${A}/${V}"

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X DELETE \
            -u "${USER}:${TOKEN}" \
            "$DELETE_URL")

          if [[ "$STATUS" != "204" && "$STATUS" != "404" ]]; then
            echo "Delete failed for ${G}:${A}:${V} (HTTP $STATUS)"
            exit 1
          fi
        done

        # -------------------------
        # Maven auth
        # -------------------------
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml <<EOF
        <settings>
          <servers>
            <server>
              <id>registry</id>
              <username>${USER}</username>
              <password>${TOKEN}</password>
            </server>
          </servers>
        </settings>
        EOF

        # -------------------------
        # Deploy
        # -------------------------
        mvn -B deploy \
          -DaltDeploymentRepository=registry::default::${PACKAGE_URL}

        # -------------------------
        # Link artifacts
        # -------------------------
        for c in "${UNIQUE_COORDS[@]}"; do
          IFS=':' read -r G A V <<< "$c"

          LINK_URL="https://${REGISTRY}/api/v1/packages/${OWNER}/maven/${G}:${A}/-/link/${REPO_NAME}"

          curl -s -o /dev/null \
            -X POST \
            -u "${USER}:${TOKEN}" \
            "$LINK_URL"
        done

        echo "Publish complete (Maven)."