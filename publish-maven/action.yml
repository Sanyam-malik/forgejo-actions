name: Publish Maven Package
description: Publish Gradle or Maven artifacts to a Maven registry

inputs:
  registry:
    description: Registry hostname
    required: true

  user:
    description: Registry username
    required: true

  token:
    description: Registry token
    required: true

  build_tool:
    description: Build tool (gradle | maven)
    required: false
    default: gradle

outputs:
  package_url:
    description: Maven repository URL
    value: ${{ steps.publish.outputs.package_url }}

runs:
  using: composite
  steps:
    - id: publish
      name: Publish package
      shell: bash
      run: |
        set -euo pipefail

        SCRIPT_DIR="${{ github.action_path }}/scripts"
        BUILD_TOOL="${{ inputs.build_tool }}"

        chmod +x "$SCRIPT_DIR/"*.sh

        case "$BUILD_TOOL" in
          gradle)
            "$SCRIPT_DIR/gradle_publish.sh" \
              "${{ inputs.registry }}" \
              "${{ inputs.user }}" \
              "${{ inputs.token }}"
            ;;
          maven)
            "$SCRIPT_DIR/maven_publish.sh" \
              "${{ inputs.registry }}" \
              "${{ inputs.user }}" \
              "${{ inputs.token }}"
            ;;
          *)
            echo "Unsupported build_tool: $BUILD_TOOL"
            exit 1
            ;;
        esac