name: Deploy to GitHub Pages
description: Deploy static site to a branch

inputs:
  site_path:
    description: Path to built site directory
    required: true

  git_user:
    description: Git username
    required: true

  git_email:
    description: Git email
    required: true

  target_branch:
    description: Branch to deploy site
    required: false
    default: gh-pages

runs:
  using: composite
  steps:
    - name: Deploy
      shell: bash
      run: |
        set -e

        SITE_PATH="${{ inputs.site_path }}"
        TARGET_BRANCH="${{ inputs.target_branch }}"

        git config --global user.email "${{ inputs.git_email }}"
        git config --global user.name "${{ inputs.git_user }}"

        echo "Preparing build output"

        rm -rf /tmp/site-build
        mkdir -p /tmp/site-build

        cp -a "$SITE_PATH"/. /tmp/site-build/

        echo "Switching to $TARGET_BRANCH branch"

        git checkout --orphan "$TARGET_BRANCH" || git checkout "$TARGET_BRANCH"
        git rm -rf . || true
        git clean -fdx

        echo "Copying build files"
        cp -a /tmp/site-build/. .

        echo "Detecting nested git repositories"

        find . -type d -name ".git" -not -path "./.git" | while read gitdir; do
          repo=$(dirname "$gitdir")
          echo "Removing embedded repo: $repo"
          rm -rf "$repo"
        done

        touch .nojekyll

        git add -A

        git commit -m "Deploy to $TARGET_BRANCH" || echo "No changes to commit"

        git push --force origin "$TARGET_BRANCH"