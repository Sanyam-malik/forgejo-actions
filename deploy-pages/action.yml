name: Deploy to GitHub Pages
description: Deploy static site to gh-pages branch

inputs:
  site_path:
    description: Path to built site directory
    required: true

  git_user:
    description: Git username
    required: true

  git_email:
    description: Git email
    required: true

runs:
  using: composite
  steps:
    - name: Deploy
      shell: bash
      run: |
        set -e

        SITE_PATH="${{ inputs.site_path }}"

        git config --global user.email "${{ inputs.git_email }}"
        git config --global user.name "${{ inputs.git_user }}"

        echo "Preparing build output"

        rm -rf /tmp/site-build
        mkdir -p /tmp/site-build

        cp -a "$SITE_PATH"/. /tmp/site-build/

        echo "Switching to gh-pages branch"

        git checkout --orphan gh-pages || git checkout gh-pages
        git rm -rf . || true
        git clean -fdx

        echo "Copying build files"
        cp -a /tmp/site-build/. .

        echo "Detecting nested git repositories"

        find . -type d -name ".git" -not -path "./.git" | while read gitdir; do
          repo=$(dirname "$gitdir")
          echo "Removing embedded repo: $repo"
          rm -rf "$repo"
        done

        touch .nojekyll

        git add -A

        git commit -m "Deploy to pages" || echo "No changes to commit"

        git push --force origin gh-pages