name: Docker Push
description: Push docker image to registry

inputs:
  registry:
    description: Registry URL
    required: true
  namespace:
    description: Registry namespace
    required: true
  image:
    description: Image name
    required: true
  tag:
    description: Image tag
    required: false
    default: latest

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        IMAGE="${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.image }}:${{ inputs.tag }}"

        echo "Preparing to push Docker image: $IMAGE"

        echo "Pushing image to registry..."
        docker push "$IMAGE"

        echo "Image pushed successfully."

        echo "Removing local image to free space..."
        docker rmi "$IMAGE" || true

        echo "Cleanup complete."