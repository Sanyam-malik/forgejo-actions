name: Docker Push
description: Push docker image to registry

inputs:
  registry:
    description: Registry URL
    required: true
  namespace:
    description: Registry namespace
    required: true
  image:
    description: Image name
    required: true
  tag:
    description: Image tag
    required: false
    default: latest

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        IMAGE="${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.image }}:${{ inputs.tag }}"

        docker push "$IMAGE"

        # Remove only this image locally
        docker rmi "$IMAGE" || true