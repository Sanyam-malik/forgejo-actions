name: Docker Build
description: Build Docker image

inputs:
  registry:
    description: Registry URL
    required: true
  namespace:
    description: Registry namespace
    required: true
  image:
    description: Image name
    required: true
  tag:
    description: Image tag
    required: false
    default: latest
  build_args:
    description: Additional docker build arguments (e.g. --build-arg FOO=bar)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        REGISTRY="${{ inputs.registry }}"

        # Remove http:// or https:// if present
        REGISTRY="${REGISTRY#http://}"
        REGISTRY="${REGISTRY#https://}"

        docker build \
          ${{ inputs.build_args }} \
          -t "${REGISTRY}/${{ inputs.namespace }}/${{ inputs.image }}:${{ inputs.tag }}" \
          .