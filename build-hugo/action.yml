name: Build Hugo Site
description: Build Hugo static website

inputs:
  working_dir:
    description: Directory containing Hugo site
    required: false
    default: "."

  base_url:
    description: Hugo base URL
    required: false
    default: "/"

outputs:
  output_dir:
    description: Hugo build output directory
    value: ${{ steps.detect-output.outputs.output_dir }}

runs:
  using: composite
  steps:
    - name: Build site
      shell: bash
      run: |
        set -e
        cd "${{ inputs.working_dir }}"

        hugo --minify --gc --baseURL "${{ inputs.base_url }}"

        OUTPUT_DIR=$(find . -type f -name "index.html" -not -path "./node_modules/*" -exec dirname {} \; | head -n 1)

        if [ -z "$OUTPUT_DIR" ]; then
          echo "❌ Could not locate Hugo build output directory."
          exit 1
        fi

        echo "Found build output directory: $OUTPUT_DIR"
        echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT