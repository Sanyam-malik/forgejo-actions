name: Build Hugo Site
description: Build Hugo static website

inputs:
  working_dir:
    description: Directory containing Hugo site
    required: false
    default: "."

  base_url:
    description: Hugo base URL
    required: false
    default: "/"

  output_dir:
    description: Custom output directory (optional)
    required: false
    default: ""

outputs:
  output_dir:
    description: Hugo build output directory
    value: ${{ steps.build.outputs.output_dir }}

runs:
  using: composite
  steps:
    - name: Build site
      id: build
      shell: bash
      run: |
        set -euo pipefail

        cd "${{ inputs.working_dir }}"

        if [ -n "${{ inputs.output_dir }}" ]; then
          echo "Using custom output directory: ${{ inputs.output_dir }}"

          hugo \
            --minify \
            --gc \
            --baseURL "${{ inputs.base_url }}" \
            --destination "${{ inputs.output_dir }}"

          OUTPUT_DIR="${{ inputs.output_dir }}"

        else
          echo "No output_dir provided. Running Hugo with default output."

          hugo \
            --minify \
            --gc \
            --baseURL "${{ inputs.base_url }}"

          # Validate Hugo output
          if [ ! -d "public" ]; then
            echo "❌ Hugo build did not produce the 'public' directory."
            exit 1
          fi

          # Case 1: Normal Hugo root index
          if [ -f "public/index.html" ]; then
            echo "Detected root index.html"
            OUTPUT_DIR="public"

          else
            echo "Root index.html not found. Searching subdirectories..."

            INDEX_FILE=$(
              find public -type f -name "index.html" \
                ! -path "public/index.html" \
                | sort \
                | head -n 1
            )

            if [ -z "$INDEX_FILE" ]; then
              echo "❌ No index.html found anywhere inside 'public'."
              echo "Debugging directory structure:"
              find public -maxdepth 3 -print
              exit 1
            fi

            OUTPUT_DIR=$(dirname "$INDEX_FILE")
          fi
        fi

        echo "Found build output directory: $OUTPUT_DIR"
        echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"