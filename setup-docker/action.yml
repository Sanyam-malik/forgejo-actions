name: Setup Docker
description: Installs Docker (if missing) and optionally configures a registry mirror

inputs:
  registry_mirror:
    description: Registry mirror URL (e.g. https://mirror.gcr.io)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Docker (install + configure)
      shell: bash
      run: |
        set -euo pipefail

        # Handle sudo (not always available)
        if command -v sudo >/dev/null 2>&1; then
          SUDO="sudo"
        else
          SUDO=""
        fi

        echo "Checking Docker..."
        if command -v docker >/dev/null 2>&1; then
          echo "Docker already installed"
        else
          echo "Installing Docker..."

          # Detect OS
          if [ -f /etc/os-release ]; then
            . /etc/os-release
            OS="$ID"
          else
            OS="$(uname -s)"
          fi

          echo "Detected OS: $OS"

          case "$OS" in
            ubuntu|debian)
              $SUDO apt-get update -y
              $SUDO apt-get install -y docker.io curl
              ;;
            fedora)
              $SUDO dnf install -y docker curl
              ;;
            centos|rhel)
              $SUDO yum install -y docker curl
              ;;
            alpine)
              $SUDO apk add --no-cache docker curl
              ;;
            arch)
              $SUDO pacman -Sy --noconfirm docker curl
              ;;
            *)
              echo "Using Docker convenience script..."
              curl -fsSL https://get.docker.com | sh
              ;;
          esac
        fi

        echo "Starting Docker..."

        STARTED="false"

        # ✅ systemd path (only if actually running systemd)
        if command -v systemctl >/dev/null 2>&1 && [ "$(ps -p 1 -o comm=)" = "systemd" ]; then
          echo "Using systemd..."
          $SUDO systemctl enable docker || true
          $SUDO systemctl start docker || true
          STARTED="true"

        # ✅ sysvinit / service fallback
        elif command -v service >/dev/null 2>&1; then
          echo "Using service..."
          $SUDO service docker start || true
          STARTED="true"
        fi

        # ✅ Final fallback: manual dockerd (for CI/containers)
        if ! docker info >/dev/null 2>&1; then
          echo "Docker not running, starting dockerd manually..."
          $SUDO dockerd > /tmp/dockerd.log 2>&1 &
          sleep 5
        fi

        # Final check
        if docker info >/dev/null 2>&1; then
          echo "Docker is running ✅"
        else
          echo "Docker failed to start ❌"
          echo "===== dockerd logs ====="
          cat /tmp/dockerd.log || true
          exit 1
        fi

        # Fix permissions (best-effort)
        if [ -n "${USER:-}" ]; then
          $SUDO usermod -aG docker "$USER" || true
        fi

        # Configure registry mirror
        if [ -n "${{ inputs.registry_mirror }}" ]; then
          echo "Configuring registry mirror..."

          $SUDO mkdir -p /etc/docker

          $SUDO tee /etc/docker/daemon.json > /dev/null <<EOF
        {
          "registry-mirrors": ["${{ inputs.registry_mirror }}"]
        }
        EOF

          # Restart Docker safely
          if command -v systemctl >/dev/null 2>&1 && [ "$(ps -p 1 -o comm=)" = "systemd" ]; then
            $SUDO systemctl restart docker || true
          elif command -v service >/dev/null 2>&1; then
            $SUDO service docker restart || true
          else
            echo "Restarting dockerd manually..."
            pkill dockerd || true
            $SUDO dockerd > /tmp/dockerd.log 2>&1 &
            sleep 5
          fi
        fi

        echo "Docker version:"
        docker --version

        echo "Docker info:"
        docker info