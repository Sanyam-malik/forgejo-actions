name: Setup Docker
description: Installs Docker (if missing) and optionally configures a registry mirror

inputs:
  registry_mirror:
    description: Registry mirror URL (e.g. https://mirror.gcr.io)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Docker (install + configure)
      shell: bash
      run: |
        set -euo pipefail

        # Handle sudo
        if command -v sudo >/dev/null 2>&1; then
          SUDO="sudo"
        else
          SUDO=""
        fi

        echo "Checking Docker..."
        if command -v docker >/dev/null 2>&1; then
          echo "Docker already installed"
        else
          echo "Installing Docker..."

          if [ -f /etc/os-release ]; then
            . /etc/os-release
            OS="$ID"
          else
            OS="$(uname -s)"
          fi

          echo "Detected OS: $OS"

          case "$OS" in
            ubuntu|debian)
              $SUDO apt-get update -y
              $SUDO apt-get install -y docker.io curl
              ;;
            fedora)
              $SUDO dnf install -y docker curl
              ;;
            centos|rhel)
              $SUDO yum install -y docker curl
              ;;
            alpine)
              $SUDO apk add --no-cache docker curl
              ;;
            arch)
              $SUDO pacman -Sy --noconfirm docker curl
              ;;
            *)
              echo "Using Docker convenience script..."
              curl -fsSL https://get.docker.com | sh
              ;;
          esac
        fi

        echo "Ensuring Docker is running..."

        # Try systemd/service (best effort only)
        if command -v systemctl >/dev/null 2>&1 && [ "$(ps -p 1 -o comm=)" = "systemd" ]; then
          $SUDO systemctl start docker || true
        elif command -v service >/dev/null 2>&1; then
          $SUDO service docker start >/dev/null 2>&1 || true
        fi

        # Fallback if not running
        if ! docker info >/dev/null 2>&1; then
          echo "Starting dockerd manually..."
          $SUDO dockerd > /tmp/dockerd.log 2>&1 &
          sleep 5
        fi

        # Final check
        if ! docker info >/dev/null 2>&1; then
          echo "Docker failed to start ❌"
          cat /tmp/dockerd.log || true
          exit 1
        fi

        echo "Docker is running ✅"

        # Fix permissions (best-effort)
        if [ -n "${USER:-}" ]; then
          $SUDO usermod -aG docker "$USER" || true
        fi

        # ✅ Configure registry mirror (EOF-safe)
        if [ -n "${{ inputs.registry_mirror }}" ]; then
          echo "Configuring registry mirror..."

          $SUDO mkdir -p /etc/docker

          # 🔥 No heredoc → no YAML bugs
          printf '{\n  "registry-mirrors": ["%s"]\n}\n' "${{ inputs.registry_mirror }}" | $SUDO tee /etc/docker/daemon.json > /dev/null

          echo "Restarting Docker (clean)..."

          # 🔥 Critical: kill old daemon completely
          $SUDO pkill dockerd || true
          sleep 2

          # start fresh daemon with new config
          $SUDO dockerd > /tmp/dockerd.log 2>&1 &
          sleep 5

          # ✅ verify mirror is active
          if docker info | grep -q "${{ inputs.registry_mirror }}"; then
            echo "Registry mirror applied ✅"
          else
            echo "Registry mirror NOT applied ❌"
            docker info
            echo "===== dockerd logs ====="
            cat /tmp/dockerd.log || true
            exit 1
          fi
        fi

        echo "Docker version:"
        docker --version

        echo "Docker info:"
        docker info