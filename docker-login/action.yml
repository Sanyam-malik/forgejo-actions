name: Docker Login
description: Login to Docker / Forgejo container registry

inputs:
  registry:
    description: Container registry URL
    required: true
  username:
    description: Registry username
    required: true
  token:
    description: Registry token/password
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      run: |
        REGISTRY="${{ inputs.registry }}"

        # Remove http:// or https:// if present
        REGISTRY="${REGISTRY#http://}"
        REGISTRY="${REGISTRY#https://}"

        echo "${{ inputs.token }}" | docker login \
          "$REGISTRY" \
          -u "${{ inputs.username }}" \
          --password-stdin