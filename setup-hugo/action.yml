name: Setup Hugo
description: Install Hugo Extended from official release

inputs:
  hugo_version:
    description: Hugo version
    required: true

runs:
  using: composite
  steps:
    - name: Install Hugo
      shell: bash
      run: |
        set -e

        VERSION="${{ inputs.hugo_version }}"
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ARCH="amd64"
        elif [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        fi
        OS="Linux"

        echo "Installing Hugo ${VERSION}"

        if [ -n "$PKG_CACHE" ]; then
          BASE_URL="https://${PKG_CACHE}/github.com/gohugoio/hugo"
          echo "Using pkg-cache mirror: $BASE_URL"
        else
          BASE_URL="https://github.com/gohugoio/hugo"
          echo "Using official Hugo releases: $BASE_URL"
        fi

        DOWNLOAD_URL="${BASE_URL}/releases/download/v${VERSION}/hugo_extended_${VERSION}_${OS}-${ARCH}.tar.gz"

        echo "Installing Hugo ${VERSION}"
        echo "Download URL: $DOWNLOAD_URL"

        curl -L --retry 5 --retry-delay 5 \
          -o hugo.tar.gz \
          "$DOWNLOAD_URL"

        tar -xzf hugo.tar.gz

        sudo mv hugo /usr/local/bin/hugo

        hugo version

        rm -f hugo.tar.gz LICENSE README.md