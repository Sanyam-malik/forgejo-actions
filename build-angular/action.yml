name: Build Angular Application
description: Install dependencies and build Angular project

inputs:
  working_dir:
    description: Directory containing Angular project
    required: false
    default: "."

  base_href:
    description: Angular base href
    required: false
    default: "/"

  build_configuration:
    description: Angular build configuration
    required: false
    default: "production"

  force_install:
    description: Force npm dependency installation
    required: false
    default: "false"

outputs:
  output_dir:
    description: Angular build output directory
    value: ${{ steps.detect-output.outputs.output_dir }}

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        set -e
        cd "${{ inputs.working_dir }}"

        if [ "${{ inputs.force_install }}" = "true" ]; then
          echo "Installing dependencies with --force"
          npm install --force
        else
          echo "Installing dependencies"
          npm install
        fi

        npm run build -- \
          --configuration "${{ inputs.build_configuration }}" \
          --base-href "${{ inputs.base_href }}"

        OUTPUT_DIR=$(find dist -type f -name "index.html" -exec dirname {} \; | head -n 1)

        if [ -z "$OUTPUT_DIR" ]; then
          echo "❌ Could not locate Angular build output directory."
          exit 1
        fi

        echo "Found build output directory: $OUTPUT_DIR"

        echo "output_dir=$OUTPUT_DIR" >> $GITHUB_OUTPUT