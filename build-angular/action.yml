name: Build Angular Application
description: Install dependencies and build Angular project

inputs:
  working_dir:
    description: Directory containing Angular project
    required: false
    default: "."

  base_href:
    description: Angular base href
    required: false
    default: "/"

  build_configuration:
    description: Angular build configuration
    required: false
    default: "production"

  force_install:
    description: Force npm dependency installation
    required: false
    default: "false"

  output_dir:
    description: Custom output directory (optional)
    required: false
    default: ""

outputs:
  output_dir:
    description: Angular build output directory
    value: ${{ steps.build.outputs.output_dir }}

runs:
  using: composite
  steps:
    - name: Install dependencies and build
      id: build
      shell: bash
      run: |
        set -euo pipefail

        cd "${{ inputs.working_dir }}"

        echo "Installing dependencies"

        if [ "${{ inputs.force_install }}" = "true" ]; then
          echo "Using npm install --force"
          npm install --force
        else
          npm install
        fi

        if [ -n "${{ inputs.output_dir }}" ]; then
          echo "Using custom output directory: ${{ inputs.output_dir }}"

          npm run build -- \
            --configuration "${{ inputs.build_configuration }}" \
            --base-href "${{ inputs.base_href }}" \
            --output-path "${{ inputs.output_dir }}"

          OUTPUT_DIR="${{ inputs.output_dir }}"

        else
          echo "No output_dir provided. Running Angular build with default output."

          npm run build -- \
            --configuration "${{ inputs.build_configuration }}" \
            --base-href "${{ inputs.base_href }}"

          # Ensure dist exists
          if [ ! -d "dist" ]; then
            echo "❌ Angular build did not produce the 'dist' directory."
            exit 1
          fi

          # Case 1: dist/index.html exists
          if [ -f "dist/index.html" ]; then
            echo "Detected root index.html"
            OUTPUT_DIR="dist"

          else
            echo "Root index.html not found. Searching subdirectories..."

            INDEX_FILE=$(
              find dist -type f -name "index.html" \
                ! -path "dist/index.html" \
                | sort \
                | head -n 1
            )

            if [ -z "$INDEX_FILE" ]; then
              echo "❌ No index.html found inside dist."
              echo "Debugging directory structure:"
              find dist -maxdepth 3 -print
              exit 1
            fi

            OUTPUT_DIR=$(dirname "$INDEX_FILE")
          fi
        fi

        echo "Detected build output directory: $OUTPUT_DIR"
        echo "output_dir=$OUTPUT_DIR" >> "$GITHUB_OUTPUT"