name: Setup Maven
description: Install Maven with optional pkg-cache mirror

inputs:
  pkg_cache:
    description: Package cache hostname (mirror/proxy)
    required: false
    default: ""

  maven_version:
    description: Maven version (use 'latest' for current stable release)
    required: false
    default: latest

outputs:
  maven_version:
    description: Installed Maven version
    value: ${{ steps.install.outputs.maven_version }}

runs:
  using: composite
  steps:
    - id: install
      name: Install Maven
      shell: bash
      run: |
        set -e

        PKG_CACHE="${{ inputs.pkg_cache }}"
        VERSION="${{ inputs.maven_version }}"

        # Choose base URL (mirror or CDN)
        if [ -n "$PKG_CACHE" ]; then
          BASE_URL="https://${PKG_CACHE}/dlcdn.apache.org/maven/maven-3"
          echo "Using pkg-cache mirror: $BASE_URL"
        else
          BASE_URL="https://dlcdn.apache.org/maven/maven-3"
          echo "Using Apache CDN: $BASE_URL"
        fi

        # Resolve latest stable version
        if [ "$VERSION" = "latest" ]; then
          METADATA_URL="https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/maven-metadata.xml"

          echo "Resolving latest stable Maven version..."

          RELEASE=$(curl -s "$METADATA_URL" | grep -oPm1 "(?<=<release>)[^<]+")

          if echo "$RELEASE" | grep -Eq "(alpha|beta|RC|M)"; then
            echo "Release tag is unstable ($RELEASE), finding latest stable..."

            VERSION=$(curl -s "$METADATA_URL" \
              | grep -oP "(?<=<version>)[^<]+" \
              | grep -Ev "(alpha|beta|RC|M)" \
              | sort -V \
              | tail -n1)
          else
            VERSION="$RELEASE"
          fi
        fi

        DOWNLOAD_URL="${BASE_URL}/${VERSION}/binaries/apache-maven-${VERSION}-bin.tar.gz"

        echo "Installing Maven $VERSION"
        echo "Download URL: $DOWNLOAD_URL"

        curl -L --retry 5 --retry-delay 5 \
          -o maven.tar.gz \
          "$DOWNLOAD_URL"

        tar -xzf maven.tar.gz
        mv "apache-maven-${VERSION}" "$HOME/.maven-dist"

        echo "maven_version=$VERSION" >> "$GITHUB_OUTPUT"

        echo "MAVEN_HOME=$HOME/.maven-dist" >> $GITHUB_ENV
        echo "PATH=$HOME/.maven-dist/bin:$PATH" >> $GITHUB_ENV
        export PATH=$HOME/.maven-dist/bin:$PATH

        echo "Maven installed at: $MAVEN_HOME/bin/mvn"
        echo "Detected mvn path: $(command -v mvn)"

        mvn -version