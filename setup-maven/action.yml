name: Setup Maven
description: Install Maven with optional pkg-cache mirror

inputs:
  pkg_cache:
    description: Package cache hostname (reverse proxy cache)
    required: false
    default: ""

  maven_version:
    description: Maven version (use 'latest' for current stable release)
    required: false
    default: latest

outputs:
  maven_version:
    description: Installed Maven version
    value: ${{ steps.install.outputs.maven_version }}

runs:
  using: composite
  steps:
    - id: install
      name: Install Maven
      shell: bash
      run: |
        set -e

        PKG_CACHE="${{ inputs.pkg_cache }}"
        VERSION="${{ inputs.maven_version }}"

        # --------------------------------------------------
        # Resolve latest version (strict X.Y.Z)
        # --------------------------------------------------
        if [ "$VERSION" = "latest" ]; then
          METADATA_URL="https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/maven-metadata.xml"

          echo "Resolving latest stable Maven version..."

          VERSION=$(curl -s "$METADATA_URL" \
            | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)
        fi

        echo "Resolved version: $VERSION"

        # --------------------------------------------------
        # Build paths
        # --------------------------------------------------
        MAJOR_VERSION=$(echo "$VERSION" | cut -d. -f1)
        BASE_PATH="maven-${MAJOR_VERSION}"
        FILE="apache-maven-${VERSION}-bin.tar.gz"

        if [ -n "$PKG_CACHE" ]; then
          echo "Using pkg-cache for ALL sources"

          URLS=(
            "https://${PKG_CACHE}/dlcdn.apache.org/maven/${BASE_PATH}/${VERSION}/binaries/${FILE}"
            "https://${PKG_CACHE}/archive.apache.org/dist/maven/${BASE_PATH}/${VERSION}/binaries/${FILE}"
          )
        else
          echo "Using public Apache sources"

          URLS=(
            "https://dlcdn.apache.org/maven/${BASE_PATH}/${VERSION}/binaries/${FILE}"
            "https://archive.apache.org/dist/maven/${BASE_PATH}/${VERSION}/binaries/${FILE}"
          )
        fi

        # --------------------------------------------------
        # Download with fallback
        # --------------------------------------------------
        SUCCESS=0

        for URL in "${URLS[@]}"; do
          echo "Trying: $URL"

          if curl -fL --retry 3 --retry-delay 5 -o maven.tar.gz "$URL"; then
            if tar -tzf maven.tar.gz >/dev/null 2>&1; then
              echo "Download + validation succeeded from: $URL"
              SUCCESS=1
              break
            else
              echo "Invalid archive (likely HTML/corrupt), trying next..."
            fi
          else
            echo "Download failed, trying next..."
          fi
        done

        if [ "$SUCCESS" -ne 1 ]; then
          echo "❌ Failed to download Maven $VERSION from all sources"
          exit 1
        fi

        # --------------------------------------------------
        # Extract & setup
        # --------------------------------------------------
        tar -xzf maven.tar.gz
        mv "apache-maven-${VERSION}" "$HOME/.maven-dist"

        # Outputs
        echo "maven_version=$VERSION" >> "$GITHUB_OUTPUT"

        # Persist for next steps
        echo "MAVEN_HOME=$HOME/.maven-dist" >> "$GITHUB_ENV"
        echo "$HOME/.maven-dist/bin" >> "$GITHUB_PATH"

        # 🔥 CRITICAL: also set for CURRENT step
        export MAVEN_HOME="$HOME/.maven-dist"
        export PATH="$MAVEN_HOME/bin:$PATH"

        echo "Maven installed at: $MAVEN_HOME/bin/mvn"
        echo "Detected mvn path: $(command -v mvn)"

        # Sanity check
        if [ ! -x "$MAVEN_HOME/bin/mvn" ]; then
          echo "❌ Maven binary not found!"
          exit 1
        fi

        mvn -version