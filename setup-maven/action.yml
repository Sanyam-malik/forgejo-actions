name: Setup Maven
description: Install Maven with optional pkg-cache mirror

inputs:
  pkg_cache:
    description: Package cache hostname (mirror/proxy)
    required: false
    default: ""

  maven_version:
    description: Maven version (use 'latest' for current stable release)
    required: false
    default: latest

outputs:
  maven_version:
    description: Installed Maven version
    value: ${{ steps.install.outputs.maven_version }}

runs:
  using: composite
  steps:
    - id: install
      name: Install Maven
      shell: bash
      run: |
        set -e

        PKG_CACHE="${{ inputs.pkg_cache }}"
        VERSION="${{ inputs.maven_version }}"

        # Choose base URL
        if [ -n "$PKG_CACHE" ]; then
          BASE_URL="https://${PKG_CACHE}/dlcdn.apache.org/maven"
          echo "Using pkg-cache mirror: $BASE_URL"
        else
          BASE_URL="https://dlcdn.apache.org/maven"
          echo "Using Apache CDN: $BASE_URL"
        fi

        # Resolve latest stable version (strict X.Y.Z only)
        if [ "$VERSION" = "latest" ]; then
          METADATA_URL="https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/maven-metadata.xml"

          echo "Resolving latest stable Maven version..."

          VERSION=$(curl -s "$METADATA_URL" \
            | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -n1)
        fi

        echo "Resolved version: $VERSION"

        # Determine major version (3 or 4)
        MAJOR_VERSION=$(echo "$VERSION" | cut -d. -f1)
        BASE_PATH="maven-${MAJOR_VERSION}"

        DOWNLOAD_URL="${BASE_URL}/${BASE_PATH}/${VERSION}/binaries/apache-maven-${VERSION}-bin.tar.gz"

        echo "Download URL: $DOWNLOAD_URL"

        # Try download (mirror or CDN fallback)
        if ! curl -fL --retry 3 --retry-delay 5 -o maven.tar.gz "$DOWNLOAD_URL"; then
          echo "Primary download failed, retrying from Apache CDN..."

          FALLBACK_URL="https://dlcdn.apache.org/maven/${BASE_PATH}/${VERSION}/binaries/apache-maven-${VERSION}-bin.tar.gz"
          echo "Fallback URL: $FALLBACK_URL"

          curl -fL --retry 5 --retry-delay 5 -o maven.tar.gz "$FALLBACK_URL"
        fi

        # Validate archive (portable)
        if ! tar -tzf maven.tar.gz >/dev/null 2>&1; then
          echo "Downloaded file is not a valid tar.gz archive!"
          echo "First few lines of response:"
          head -n 20 maven.tar.gz || true
          exit 1
        fi

        # Extract and setup
        tar -xzf maven.tar.gz
        mv "apache-maven-${VERSION}" "$HOME/.maven-dist"

        echo "maven_version=$VERSION" >> "$GITHUB_OUTPUT"

        echo "MAVEN_HOME=$HOME/.maven-dist" >> $GITHUB_ENV
        echo "PATH=$HOME/.maven-dist/bin:$PATH" >> $GITHUB_ENV
        export PATH=$HOME/.maven-dist/bin:$PATH

        echo "Maven installed at: $MAVEN_HOME/bin/mvn"
        echo "Detected mvn path: $(command -v mvn)"

        mvn -version