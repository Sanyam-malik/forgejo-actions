name: "Push Clean History"
description: "Reinitialize repo and push clean history to any git remote"

inputs:
  remote_url:
    description: "Base git remote URL (without credentials)"
    required: true
  token:
    description: "Auth token (used for HTTPS remotes)"
    required: false
  user_name:
    description: "Git username"
    required: true
  user_email:
    description: "Git email"
    required: true
  branch:
    description: "Branch to push"
    required: false
    default: "main"
  commit_message:
    description: "Commit message"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Push clean history to remote
      shell: bash
      run: |
        set -euo pipefail

        REMOTE_URL="${{ inputs.remote_url }}"
        TOKEN="${{ inputs.token }}"
        BRANCH="${{ inputs.branch }}"

        # Get the last commit short SHA from current repo
        if git rev-parse --verify HEAD >/dev/null 2>&1; then
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "Last commit SHA detected: $SHORT_SHA"
        else
          SHORT_SHA="no-history"
          echo "No previous commits found."
        fi

        # Inject token into HTTPS URL if provided
        if [[ "$REMOTE_URL" == https://* && -n "$TOKEN" ]]; then
          AUTHED_URL=$(echo "$REMOTE_URL" | sed "s#https://#https://x-access-token:${TOKEN}@#")
        else
          AUTHED_URL="$REMOTE_URL"
        fi

        echo "➡️ Preparing clean repository..."

        # Remove old git history
        rm -rf .git

        # Re-init repo
        git init
        git config user.name "${{ inputs.user_name }}"
        git config user.email "${{ inputs.user_email }}"

        # Add all files
        git add .

        # Commit with "Clean sync up to <SHORT_SHA>" if no message provided
        if [[ -n "${{ inputs.commit_message }}" ]]; then
          COMMIT_MSG="${{ inputs.commit_message }}"
        else
          COMMIT_MSG="Clean sync up to ${SHORT_SHA}"
        fi

        git commit -m "$COMMIT_MSG"

        # Set branch
        git branch -M "$BRANCH"

        # Add remote
        git remote add target "$AUTHED_URL"

        # Push
        git push target "$BRANCH" --force

        echo "✅ Push completed successfully (commit: $COMMIT_MSG)"