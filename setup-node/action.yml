name: Setup Node
description: Install Node.js with optional pkg-cache mirror

inputs:
  node_version:
    description: Node.js major version (e.g. 20, 21)
    required: false
    default: "20"

  pkg_cache:
    description: pkg-cache hostname
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Node
      shell: bash
      run: |
        set -e

        MAJOR="${{ inputs.node_version }}"
        PKG_CACHE="${{ inputs.pkg_cache }}"

        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ARCH="x64"
        elif [ "$ARCH" = "aarch64" ]; then
          ARCH="arm64"
        fi

        if [ -n "$PKG_CACHE" ]; then
          BASE_URL="https://${PKG_CACHE}/nodejs.org"
          echo "Using pkg-cache mirror: $BASE_URL"
        else
          BASE_URL="https://nodejs.org"
          echo "Using official Node distribution"
        fi

        echo "Detecting latest Node ${MAJOR}.x version..."

        VERSION=$(curl -s "${BASE_URL}/dist/index.json" \
          | grep -oP '"version":\s*"\K[^"]+' \
          | grep "^v${MAJOR}\." \
          | head -n 1)

        if [ -z "$VERSION" ]; then
          echo "Could not detect Node ${MAJOR} version"
          exit 1
        fi

        echo "Latest version detected: $VERSION"

        NODE_DIST="node-${VERSION}-linux-${ARCH}"
        DOWNLOAD_URL="${BASE_URL}/dist/${VERSION}/${NODE_DIST}.tar.xz"

        echo "Downloading $DOWNLOAD_URL"

        curl -L --retry 5 --retry-delay 5 \
          -o node.tar.xz \
          "$DOWNLOAD_URL"

        tar -xf node.tar.xz
        mv "$NODE_DIST" "$HOME/.node"

        echo "$HOME/.node/bin" >> "$GITHUB_PATH"
        echo "PATH=$HOME/.node/bin:$PATH" >> "$GITHUB_ENV"
        export PATH="$HOME/.node/bin:$PATH"

        echo "Node installed at: $HOME/.node/bin/node"
        echo "Detected node path: $(command -v node)"

        echo "Node Version: $(node -v)"
        echo "NPM Version: $(npm -v)"

        # Configure npm registry to use pkg-cache
        if [ -n "$PKG_CACHE" ]; then
          NPM_REGISTRY="https://${PKG_CACHE}/registry.npmjs.org/"

          echo "Configuring npm to use pkg-cache registry: $NPM_REGISTRY"

          npm config set registry "$NPM_REGISTRY"

          # Also create npmrc so future shells respect it
          echo "registry=$NPM_REGISTRY" >> "$HOME/.npmrc"

          echo "npm registry configured": $NPM_REGISTRY
        fi